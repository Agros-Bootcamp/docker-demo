version: '3'
services:

  api-node:
    build: api-node
    ports:
      - 8080:8081
    volumes:
      - ./api-node:/app

  node-services:
    build: node-services
    ports:
      - 8081:8081
    volumes:
      - ./node-services:/app

  api-python:
    build: api-python
    links:
      - api-node
    ports:
      - 8090:8081
    volumes:
      - ./api-python:/app
